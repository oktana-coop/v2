appId: dev.oktana.v2
compression: normal
directories:
  output: bin
  buildResources: public
electronLanguages:
  - en-US
files:
  - dist/**/*
  - package.json
  - '!**/*.map'
  - '!**/node_modules/@swc/**'
mac:
  icon: public/macos-dock-icon.png
  x64ArchFiles: Contents/Resources/app.asar.unpacked/**/*.node
  fileAssociations:
    - ext: v2
      name: v2
      role: Editor
      icon: public/v2.icns
  target:
    - target: dmg
      arch:
        - x64
        - arm64
        - universal
    - target: zip
      arch:
        - x64
        - arm64
        - universal
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: public/macos-notarization/entitlements.mac.plist
  entitlementsInherit: public/macos-notarization/entitlements.mac.plist
win:
  artifactName: ${productName}-Setup-${version}.${ext}
  verifyUpdateCodeSignature: false
  target:
    - target: nsis
      arch:
        - x64
        - arm64
        - ia32
  azureSignOptions:
    publisherName: Oktana Lab IKE
    endpoint: https://weu.codesigning.azure.net/
    codeSigningAccountName: default-artifact-signing
    certificateProfileName: v2-public-trust
  fileAssociations:
    - ext: v2
      name: v2
      description: v2 Document
      icon: public/icon.ico
linux:
  icon: public/icons/icon
  artifactName: ${productName}-${version}-${arch}.${ext}
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
    - target: rpm
      arch:
        - x64
        - arm64
  fileAssociations:
    - ext: v2
      name: v2
publish:
  - provider: github
    owner: oktana-coop
    repo: v2
nsis:
  perMachine: true
